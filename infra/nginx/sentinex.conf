worker_processes auto;
worker_rlimit_nofile 65535;

events { worker_connections 2048; }

http {
    include mime.types;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    server_tokens off;
    client_max_body_size 20m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    limit_req_zone $binary_remote_addr zone=per_ip:10m rate=20r/s;
    limit_req_zone $host zone=per_tenant:10m rate=200r/s;

    upstream app {
        # Deploy script rewrites this file to swap targets between web_a and web_b.
        server web_a:8000 max_fails=3 fail_timeout=10s;
    }

    server {
        listen 80 default_server;
        server_name _;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name sentinex.example ~^(?<sub>.+)\.sentinex\.example$;

        ssl_certificate     /etc/letsencrypt/live/sentinex.example/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/sentinex.example/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        location /static/ {
            alias /var/www/static/;
            expires 7d;
            access_log off;
        }

        location /media/ {
            alias /var/www/media/;
            expires 30d;
        }

        location / {
            limit_req zone=per_ip burst=40 nodelay;
            proxy_pass         http://app;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_connect_timeout 10s;
            proxy_read_timeout 120s;
        }
    }
}
