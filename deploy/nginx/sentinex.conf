# Sentinex nginx — wildcard subdomain routing → web:8000.
# TLS termination expected via certbot wildcard cert mounted at /etc/letsencrypt.

upstream sentinex_web {
    server web:8000;
}

# HTTP — redirect to HTTPS, but allow ACME + /health/ in plaintext.
server {
    listen 80;
    server_name sentinex.io *.sentinex.io;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location = /health/ {
        proxy_pass http://sentinex_web;
        proxy_set_header Host $host;
        access_log off;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — proxy everything to the gunicorn upstream, serve static directly.
server {
    listen 443 ssl;
    http2 on;
    server_name sentinex.io *.sentinex.io;

    ssl_certificate     /etc/letsencrypt/live/sentinex.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sentinex.io/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    client_max_body_size 25m;

    # Static + media served directly from shared volumes.
    location /static/ {
        alias /var/www/static/;
        access_log off;
        expires 7d;
    }

    location /media/ {
        alias /var/www/media/;
        access_log off;
        expires 1d;
    }

    # Health check — public, no auth, fast.
    location = /health/ {
        proxy_pass http://sentinex_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        access_log off;
    }

    location / {
        proxy_pass http://sentinex_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_read_timeout 120s;
    }
}
