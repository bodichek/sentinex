name: Auto Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  update-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: |
          pip install poetry==1.8.3
          poetry config virtualenvs.in-project true

      - name: Install dependencies
        run: poetry install --no-interaction --only docs

      - name: Install Claude Code CLI
        run: |
          npm install -g @anthropic-ai/claude-code

      - name: Generate auto docs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # Analyze recent changes and update docs/auto/
          claude --dangerously-skip-permissions \
            --print \
            "Analyze the recent changes in this repository (last commit) \
             and update the docs/auto/ directory with: \
             1. Updated architecture diagram (Mermaid) in docs/auto/architecture-diagram.md \
             2. Updated API reference in docs/auto/api.md \
             3. Updated Insight Functions list in docs/auto/insight-functions.md \
             4. Append to docs/auto/changelog.md a summary of this commit's changes. \
             Follow the conventions in .claude/skills/update-docs.md. \
             Commit nothing — I will handle the PR."

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet docs/auto/; then
            echo "changes=false" >> $GITHUB_OUTPUT
          else
            echo "changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.changes.outputs.changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: docs/auto-update-${{ github.run_number }}
          title: "docs: automatic documentation update"
          body: |
            Automated documentation update based on changes in main.

            Please review and merge if changes look correct.

            Generated by the Auto Docs workflow.
          commit-message: "docs: auto-update from commit ${{ github.sha }}"
          add-paths: docs/auto/
