{% extends "base.html" %}
{% block title %}Firemní znalosti — Sentinex{% endblock %}
{% block content %}
<div class="bg-white rounded-lg shadow p-6 max-w-4xl">
  <h1 class="text-xl font-semibold">Firemní znalosti</h1>
  <p class="text-sm text-gray-600 mt-1">
    Sémantické vyhledávání nad indexovanými dokumenty (Drive, Gmail, Calendar).
  </p>

  <form method="get"
        hx-get="{% url 'knowledge_search' %}"
        hx-target="#results"
        hx-trigger="submit, keyup changed delay:400ms from:input[name=q]"
        class="mt-5 flex gap-3">
    <input type="text" name="q" value="{{ query }}"
           placeholder="Zeptej se na cokoliv z firemních dokumentů..."
           class="flex-1 px-4 py-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none"
           autocomplete="off" autofocus />
    <input type="hidden" name="k" value="{{ top_k }}" />
    <button class="bg-blue-600 text-white px-5 py-2 rounded hover:bg-blue-700">Hledat</button>
  </form>

  <div id="results" class="mt-6">
    {% include "knowledge/_results.html" %}
  </div>
</div>
{% endblock %}
